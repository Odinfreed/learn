<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>渗透测试学习导航 | 问题驱动实战路线</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Fira Code', 'Cascadia Code', monospace, system-ui;
            background: #1e1e2f;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        /* 整体布局 */
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* 侧边栏 (文件树风格) */
        .sidebar {
            width: 320px;
            background: #11111f;
            border-right: 1px solid #2a2a3a;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px 16px;
            background: #0b0b14;
            border-bottom: 1px solid #2a2a3a;
        }

        .sidebar-header h2 {
            font-size: 1.3rem;
            letter-spacing: 1px;
            font-weight: 600;
            color: #4c9aff;
        }

        .sidebar-header p {
            font-size: 0.75rem;
            color: #8a8aa5;
            margin-top: 6px;
        }

        /* 日期设置区域 */
        .date-settings {
            padding: 12px 16px;
            background: #0f0f1a;
            border-bottom: 1px solid #2a2a3a;
        }
        .date-settings label {
            font-size: 0.75rem;
            color: #aaa;
            display: block;
            margin-bottom: 6px;
        }
        .date-settings input {
            background: #1e1e2e;
            border: 1px solid #3a3a5a;
            color: white;
            padding: 6px 10px;
            border-radius: 8px;
            width: 100%;
            font-family: monospace;
        }
        .date-settings button {
            margin-top: 8px;
            background: #2a2a3a;
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .date-settings .info {
            font-size: 0.7rem;
            color: #8a8aa5;
            margin-top: 6px;
        }

        /* 日程树 */
        .schedule-tree {
            padding: 16px 12px;
            flex: 1;
        }

        .tree-category {
            margin-bottom: 24px;
        }

        .tree-category-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #7c7c9c;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-left: 8px;
        }

        .tree-item {
            display: block;
            padding: 8px 12px;
            margin: 2px 0;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #cdcdff;
            text-decoration: none;
            transition: all 0.2s ease;
            font-family: 'Fira Code', monospace;
        }

        .tree-item:hover {
            background: #2a2a3a;
            color: white;
            padding-left: 20px;
        }

        .tree-item.active {
            background: #2a2a5a;
            color: #bbd9ff;
            border-left: 3px solid #4c9aff;
        }

        .tree-item .badge {
            float: right;
            font-size: 0.7rem;
            background: #2a2a3a;
            padding: 2px 6px;
            border-radius: 20px;
            color: #aaa;
        }

        .tree-item.completed .badge {
            background: #2e6b3e;
            color: #b0ffb0;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            background: #1a1a2a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            background: #0f0f1a;
            padding: 10px 20px;
            border-bottom: 1px solid #2a2a3a;
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 0.8rem;
        }

        .toolbar button {
            background: #2a2a3a;
            border: none;
            color: #ddd;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-family: monospace;
            transition: 0.2s;
        }

        .toolbar button:hover {
            background: #3a3a5a;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #1e1e2e;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #11111f;
        }
        ::-webkit-scrollbar-thumb {
            background: #4c4c6e;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>📡 渗透·问题驱动</h2>
            <p>从实战出发 · 每日一关</p>
        </div>
        <div class="date-settings">
            <label>📅 开始日期（第1天）</label>
            <input type="date" id="start-date" value="2026-07-01">
            <button id="set-start-date">设置并刷新今日任务</button>
            <div class="info" id="today-info"></div>
        </div>
        <div class="schedule-tree">
            <!-- 总览与今日入口 -->
            <div class="tree-category">
                <div class="tree-category-title">📌 导航</div>
                <a href="#" class="tree-item" data-src="total_schedule.html">
                    📅 总日程规划 · 知识体系
                </a>
                <a href="#" class="tree-item active" id="today-task-link" data-src="">
                    🚀 今日任务（加载中...）
                </a>
            </div>

            <!-- 每日任务列表 (预置30天链接，按需创建文件) -->
            <div class="tree-category">
                <div class="tree-category-title">🗓️ 实战日程 (1~30天)</div>
                <div id="daily-links"></div>
            </div>

            <!-- 资源/工具 -->
            <div class="tree-category">
                <div class="tree-category-title">🛠️ 工具链</div>
                <a href="https://www.kali.org/get-kali/" class="tree-item" target="_blank">Kali Linux 镜像</a>
                <a href="https://sourceforge.net/projects/metasploitable/" class="tree-item" target="_blank">Metasploitable 2</a>
                <a href="https://portswigger.net/burp/communitydownload" class="tree-item" target="_blank">Burp Suite</a>
                <a href="https://github.com/opsdisk/metagoofil" class="tree-item" target="_blank">信息收集工具集</a>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="toolbar">
            <span>📂 当前文档：</span>
            <span id="current-doc-name">今日任务</span>
            <button id="open-in-new-tab">🔗 新窗口打开</button>
        </div>
        <iframe id="content-frame" src="total_schedule.html" title="学习内容"></iframe>
    </div>
</div>

<script>
    // 获取DOM元素
    const startDateInput = document.getElementById('start-date');
    const setStartDateBtn = document.getElementById('set-start-date');
    const todayInfoSpan = document.getElementById('today-info');
    const todayTaskLink = document.getElementById('today-task-link');
    const contentFrame = document.getElementById('content-frame');
    const currentDocNameSpan = document.getElementById('current-doc-name');
    const dailyLinksContainer = document.getElementById('daily-links');

    // 存储开始日期（时间戳，仅日期部分）
    let startDate = null;

    // 初始化：从 localStorage 读取开始日期，否则默认为 2026-07-01
    function loadStartDate() {
        const saved = localStorage.getItem('pentest_start_date');
        if (saved) {
            startDate = new Date(saved);
            // 避免时区问题，只保留日期部分
            startDate.setHours(0,0,0,0);
            startDateInput.value = saved;
        } else {
            startDate = new Date(2026, 6, 1); // 注意月份从0开始，7月是6
            startDate.setHours(0,0,0,0);
            startDateInput.value = '2026-07-01';
        }
    }

    // 保存开始日期到 localStorage
    function saveStartDate(dateStr) {
        localStorage.setItem('pentest_start_date', dateStr);
    }

    // 计算今天距离开始日期的天数（从1开始）
    function getTodayDayNumber() {
        const today = new Date();
        today.setHours(0,0,0,0);
        const diffTime = today - startDate;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        // 如果今天早于开始日期，返回1（第1天）
        if (diffDays < 0) return 1;
        // 天数+1，因为第1天是diffDays=0
        return diffDays + 1;
    }

    // 更新今日任务链接和显示信息
    function updateTodayTask() {
        const dayNumber = getTodayDayNumber();
        const dayFileName = `day${dayNumber}.html`;
        todayTaskLink.setAttribute('data-src', dayFileName);
        todayTaskLink.innerHTML = `🚀 今日任务：第 ${dayNumber} 天 <span class="badge">自动定位</span>`;
        todayInfoSpan.innerHTML = `📅 开始: ${startDate.toLocaleDateString()} | 今日: 第 ${dayNumber} 天`;
        // 如果当前 iframe 显示的是今日任务（即 data-src 匹配），则自动刷新
        const currentSrc = contentFrame.src;
        if (currentSrc.includes('today') || currentSrc.includes('day')) {
            // 如果当前显示的是任何任务页，刷新为新的今日任务
            contentFrame.src = dayFileName;
            currentDocNameSpan.innerText = `今日任务 (第${dayNumber}天)`;
            // 高亮今日任务链接
            document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
            todayTaskLink.classList.add('active');
        }
    }

    // 生成每日链接 (day1.html ~ day30.html)
    function generateDailyLinks() {
        dailyLinksContainer.innerHTML = '';
        for (let i = 1; i <= 30; i++) {
            const dayNum = i.toString().padStart(2, '0');
            const link = document.createElement('a');
            link.href = '#';
            link.className = 'tree-item';
            link.setAttribute('data-src', `day${i}.html`);
            // 判断是否今日任务，用于高亮（但高亮逻辑在点击时处理）
            const todayNum = getTodayDayNumber();
            if (i === todayNum) {
                link.innerHTML = `📘 Day ${dayNum} · 第${i}天 <span class="badge">今日</span>`;
                // 如果当前活动链接是今日任务，则额外标记
                if (todayTaskLink.classList.contains('active')) {
                    link.classList.add('active');
                }
            } else {
                link.innerHTML = `📄 Day ${dayNum} · 第${i}天 <span class="badge">待学习</span>`;
            }
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const src = link.getAttribute('data-src');
                contentFrame.src = src;
                // 更新高亮
                document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
                link.classList.add('active');
                // 更新顶部文档名
                const match = src.match(/day(\d+)\.html/);
                if (match) {
                    currentDocNameSpan.innerText = `第 ${match[1]} 天 日程`;
                } else {
                    currentDocNameSpan.innerText = src;
                }
            });
            dailyLinksContainer.appendChild(link);
        }
    }

    // 重新设置开始日期
    function setStartDate(newDateStr) {
        const newDate = new Date(newDateStr);
        newDate.setHours(0,0,0,0);
        if (isNaN(newDate)) return;
        startDate = newDate;
        saveStartDate(newDateStr);
        // 重新生成侧边栏每日链接（因为今日标记会变）
        generateDailyLinks();
        // 更新今日任务链接
        updateTodayTask();
        // 如果当前iframe显示的是总日程，保持不变；如果显示的是某一天，可保持不变（但今日任务链接变了，用户可手动刷新）
    }

    // 事件绑定
    setStartDateBtn.addEventListener('click', () => {
        const newDate = startDateInput.value;
        if (newDate) {
            setStartDate(newDate);
        }
    });

    // 处理导航栏其他链接（总日程规划等）
    document.querySelectorAll('.tree-item[data-src]').forEach(item => {
        // 跳过今日任务链接，因为它已经单独处理过，但也可以统一处理，避免重复
        if (item.id === 'today-task-link') return;
        item.addEventListener('click', (e) => {
            e.preventDefault();
            const src = item.getAttribute('data-src');
            contentFrame.src = src;
            document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
            item.classList.add('active');
            // 更新文档名
            if (src === 'total_schedule.html') {
                currentDocNameSpan.innerText = '总日程规划';
            } else {
                const match = src.match(/day(\d+)\.html/);
                if (match) {
                    currentDocNameSpan.innerText = `第 ${match[1]} 天 日程`;
                } else {
                    currentDocNameSpan.innerText = src;
                }
            }
        });
    });

    // 今日任务链接的点击事件（单独处理）
    todayTaskLink.addEventListener('click', (e) => {
        e.preventDefault();
        const src = todayTaskLink.getAttribute('data-src');
        if (src) {
            contentFrame.src = src;
            document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
            todayTaskLink.classList.add('active');
            const dayNum = getTodayDayNumber();
            currentDocNameSpan.innerText = `今日任务 (第${dayNum}天)`;
        } else {
            alert('请先设置开始日期');
        }
    });

    // 新窗口打开
    document.getElementById('open-in-new-tab').addEventListener('click', () => {
        const currentSrc = contentFrame.src;
        if (currentSrc && currentSrc !== 'about:blank') {
            window.open(currentSrc, '_blank');
        } else {
            alert('没有可打开的内容');
        }
    });

    // 初始化
    loadStartDate();
    generateDailyLinks();
    updateTodayTask();

    // 默认加载总日程规划（或上次加载的内容，但为了体验，加载总日程）
    contentFrame.src = 'total_schedule.html';
    currentDocNameSpan.innerText = '总日程规划';
    // 高亮总日程链接
    const totalScheduleLink = document.querySelector('.tree-item[data-src="total_schedule.html"]');
    if (totalScheduleLink) totalScheduleLink.classList.add('active');
</script>
</body>
</html>
